services:
  # ── Single Web Service: API + Frontend ──────────────────────────────────────
  - type: web
    name: edward-md
    runtime: node
    plan: free
    region: oregon
    rootDir: .
    buildCommand: >-
      npm install -g pnpm &&
      pnpm install --frozen-lockfile &&
      BASE_PATH=/ PORT=3000 pnpm --filter @workspace/edward-md run build &&
      mkdir -p artifacts/api-server/public &&
      cp -r artifacts/edward-md/dist/public/. artifacts/api-server/public/ &&
      pnpm --filter @workspace/api-server run build
    startCommand: NODE_ENV=production PORT=$PORT node artifacts/api-server/dist/index.mjs
    healthCheckPath: /api/healthz
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: BASE_PATH
        value: /
      - key: STORAGE_DIR
        value: /storage
      # After first deploy, set this to your Render service URL so keepalive works
      # e.g. https://edward-md.onrender.com
      - key: SELF_URL
        value: ""
    disk:
      name: edward-md-storage
      mountPath: /storage
      sizeGB: 1
    scaling:
      minInstances: 1
      maxInstances: 1
