services:
  # ── Single Web Service: API + Frontend ──────────────────────────────────────
  - type: web
    name: edward-md
    runtime: node
    plan: free
    region: oregon
    rootDir: .
    buildCommand: >-
      npm install -g pnpm &&
      pnpm install --frozen-lockfile &&
      BASE_PATH=/ PORT=3000 pnpm --filter @workspace/edward-md run build &&
      mkdir -p artifacts/api-server/public &&
      cp -r artifacts/edward-md/dist/public/. artifacts/api-server/public/ &&
      pnpm --filter @workspace/api-server run build
    startCommand: NODE_ENV=production PORT=$PORT node artifacts/api-server/dist/index.mjs
    healthCheckPath: /api/healthz
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production

      - key: BASE_PATH
        value: /

      # ── Storage ─────────────────────────────────────────────────────────────
      - key: STORAGE_DIR
        value: /storage

      # ── Admin credentials ───────────────────────────────────────────────────
      - key: ADMIN_EMAIL
        value: gboyegaibk@gmail.com

      - key: ADMIN_PASSWORD
        value: Oyinlola@007

      # Generate a strong random string for token signing — change after first deploy
      - key: ADMIN_SECRET
        generateValue: true

      # ── MongoDB (optional — bot runs in-memory without it) ──────────────────
      # Set your MongoDB Atlas connection string here after first deploy
      - key: MONGODB_URI
        value: ""

      # ── Self URL for keep-alive pings ───────────────────────────────────────
      # Render provides RENDER_EXTERNAL_URL automatically; set SELF_URL only
      # if you want to override it (e.g. custom domain).
      - key: SELF_URL
        value: ""

    disk:
      name: edward-md-storage
      mountPath: /storage
      sizeGB: 1

    scaling:
      minInstances: 1
      maxInstances: 1
