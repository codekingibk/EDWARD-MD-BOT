services:
  # ── Single Web Service: API + Frontend ──────────────────────────────────────
  - type: web
    name: edward-md
    runtime: node
    plan: free
    region: oregon
    rootDir: .
    buildCommand: >-
      npm install -g pnpm &&
      pnpm install --frozen-lockfile &&
      BASE_PATH=/ PORT=3000 pnpm --filter @workspace/edward-md run build &&
      mkdir -p artifacts/api-server/public &&
      cp -r artifacts/edward-md/dist/public/. artifacts/api-server/public/ &&
      pnpm --filter @workspace/api-server run build
    startCommand: node artifacts/api-server/dist/index.mjs
    healthCheckPath: /api/healthz
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production

      - key: BASE_PATH
        value: /

      - key: STORAGE_DIR
        value: /opt/render/project/src/storage

      # ── Admin credentials ───────────────────────────────────────────────────
      - key: ADMIN_EMAIL
        value: gboyegaibk@gmail.com

      - key: ADMIN_PASSWORD
        value: Oyinlola@007

      - key: ADMIN_SECRET
        generateValue: true

      # ── MongoDB — set your Atlas connection string here ─────────────────────
      - key: MONGODB_URI
        value: ""

      # ── Keep-alive — Render auto-provides RENDER_EXTERNAL_URL ──────────────
      - key: SELF_URL
        value: ""
